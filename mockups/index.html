<style>
  :root {
    /* Fluent neutrals with a cool bias — Mica greys, not pure grey */
    --bg: #f3f3f3;
    --mica-a: #eef1f5;
    --mica-b: #f6f4f2;
    --layer: #fbfbfbcc;
    --layer-solid: #fbfbfb;
    --layer-alt: #f2f2f2;
    --card: #ffffff;
    --stroke: rgba(0,0,0,0.07);
    --stroke-strong: rgba(0,0,0,0.12);
    --text: #1b1b1b;
    --text-2: #616161;
    --text-3: #8a8a8a;
    --accent: #0067c0;
    --accent-2: #0078d4;
    --accent-soft: rgba(0,103,192,0.10);
    --hover: rgba(0,0,0,0.035);
    --active: rgba(0,0,0,0.06);
    --sel: rgba(0,103,192,0.09);
    --sel-bar: #0067c0;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
    --cpu: #0a84ff;
    --mem: #9d5cff;
    --disk: #1a9c56;
    --net: #d68a00;
    --gpu: #d83b8e;
    --good: #1a9c56;
    --warn: #c88a00;
    --crit: #d13438;
    --radius: 8px;
    --rail-w: 250px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #202020;
      --mica-a: #232427;
      --mica-b: #1d1e22;
      --layer: #2b2b2bcc;
      --layer-solid: #2b2b2b;
      --layer-alt: #272727;
      --card: #2d2d2d;
      --stroke: rgba(255,255,255,0.07);
      --stroke-strong: rgba(255,255,255,0.12);
      --text: #ffffff;
      --text-2: #cfcfcf;
      --text-3: #949494;
      --accent: #4cc2ff;
      --accent-2: #60cdff;
      --accent-soft: rgba(76,194,255,0.12);
      --hover: rgba(255,255,255,0.045);
      --active: rgba(255,255,255,0.08);
      --sel: rgba(76,194,255,0.13);
      --sel-bar: #4cc2ff;
      --shadow: 0 2px 10px rgba(0,0,0,0.45);
      --cpu: #4cc2ff;
      --mem: #b18cff;
      --disk: #4bd08b;
      --net: #f0b429;
      --gpu: #ff6fb5;
      --good: #4bd08b;
      --warn: #f0b429;
      --crit: #ff5b5f;
    }
  }
  :root[data-theme="light"] {
    --bg:#f3f3f3;--mica-a:#eef1f5;--mica-b:#f6f4f2;--layer:#fbfbfbcc;--layer-solid:#fbfbfb;--layer-alt:#f2f2f2;--card:#fff;
    --stroke:rgba(0,0,0,0.07);--stroke-strong:rgba(0,0,0,0.12);--text:#1b1b1b;--text-2:#616161;--text-3:#8a8a8a;
    --accent:#0067c0;--accent-2:#0078d4;--accent-soft:rgba(0,103,192,0.10);--hover:rgba(0,0,0,0.035);--active:rgba(0,0,0,0.06);
    --sel:rgba(0,103,192,0.09);--sel-bar:#0067c0;--shadow:0 2px 8px rgba(0,0,0,0.10);
    --cpu:#0a84ff;--mem:#9d5cff;--disk:#1a9c56;--net:#d68a00;--gpu:#d83b8e;--good:#1a9c56;--warn:#c88a00;--crit:#d13438;
  }
  :root[data-theme="dark"] {
    --bg:#202020;--mica-a:#232427;--mica-b:#1d1e22;--layer:#2b2b2bcc;--layer-solid:#2b2b2b;--layer-alt:#272727;--card:#2d2d2d;
    --stroke:rgba(255,255,255,0.07);--stroke-strong:rgba(255,255,255,0.12);--text:#fff;--text-2:#cfcfcf;--text-3:#949494;
    --accent:#4cc2ff;--accent-2:#60cdff;--accent-soft:rgba(76,194,255,0.12);--hover:rgba(255,255,255,0.045);--active:rgba(255,255,255,0.08);
    --sel:rgba(76,194,255,0.13);--sel-bar:#4cc2ff;--shadow:0 2px 10px rgba(0,0,0,0.45);
    --cpu:#4cc2ff;--mem:#b18cff;--disk:#4bd08b;--net:#f0b429;--gpu:#ff6fb5;--good:#4bd08b;--warn:#f0b429;--crit:#ff5b5f;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(120% 90% at 8% 0%, var(--mica-a), transparent 60%),
      radial-gradient(120% 100% at 100% 100%, var(--mica-b), transparent 55%),
      var(--bg);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb { background: var(--stroke-strong); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: padding-box; border: 3px solid transparent; }

  .win {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: 40px 1fr;
    grid-template-columns: var(--rail-w) 1fr;
    grid-template-areas: "title title" "rail main";
  }

  /* ---- Title bar (Mica) ---- */
  .titlebar {
    grid-area: title;
    display: flex; align-items: center; gap: 10px;
    padding-left: 14px;
    -webkit-user-select: none; user-select: none;
    border-bottom: 1px solid var(--stroke);
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 12.5px; letter-spacing: .1px; }
  .brand .glyph {
    width: 18px; height: 18px; display: grid; place-items: center;
    color: var(--accent);
  }
  .brand .tag { color: var(--text-3); font-weight: 400; }
  .win-controls { margin-left: auto; display: flex; height: 40px; }
  .win-controls button {
    width: 46px; height: 40px; border: 0; background: transparent; color: var(--text-2);
    display: grid; place-items: center; cursor: default;
  }
  .win-controls button:hover { background: var(--hover); }
  .win-controls button.close:hover { background: #c42b1c; color: #fff; }
  .win-controls svg { width: 10px; height: 10px; }

  /* ---- Left rail ---- */
  .rail {
    grid-area: rail;
    padding: 6px 8px 10px;
    display: flex; flex-direction: column; gap: 2px;
    border-right: 1px solid var(--stroke);
    overflow-y: auto;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    height: 38px; padding: 0 12px; border-radius: 6px;
    color: var(--text); cursor: pointer; position: relative;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--active); }
  .nav-item.active::before {
    content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 16px; border-radius: 3px; background: var(--sel-bar);
  }
  .nav-item .ico { width: 18px; height: 18px; flex: 0 0 18px; color: var(--text-2); }
  .nav-item.active .ico { color: var(--accent); }
  .nav-item .label { font-size: 13px; }
  .nav-item .mini { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--text-3); font-size: 11px; }
  .rail-sep { height: 1px; background: var(--stroke); margin: 6px 10px; }
  .rail-spacer { flex: 1; }

  /* ---- Main ---- */
  .main { grid-area: main; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
  .view { display: none; flex-direction: column; min-height: 0; height: 100%; }
  .view.active { display: flex; }

  .commandbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px 10px;
  }
  .view-title { font-size: 20px; font-weight: 600; letter-spacing: -0.1px; }
  .view-sub { color: var(--text-2); font-size: 12px; margin-top: 1px; }
  .cmd-spacer { flex: 1; }
  .btn {
    height: 32px; padding: 0 14px; border-radius: 5px; border: 1px solid var(--stroke-strong);
    background: var(--layer-solid); color: var(--text); font: inherit; font-size: 12.5px;
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  }
  .btn:hover { background: var(--hover); }
  .btn svg { width: 14px; height: 14px; }
  .btn.accent { background: var(--accent); border-color: transparent; color: #fff; font-weight: 600; }
  .btn.accent:hover { background: var(--accent-2); }
  .btn.danger { color: var(--crit); }
  .btn:disabled { opacity: .45; cursor: default; }
  .search {
    height: 32px; display: flex; align-items: center; gap: 8px; padding: 0 10px;
    border-radius: 5px; border: 1px solid var(--stroke-strong); background: var(--layer-solid);
    min-width: 210px;
  }
  .search svg { width: 14px; height: 14px; color: var(--text-3); }
  .search input { border: 0; background: transparent; color: var(--text); font: inherit; outline: none; width: 100%; }

  /* ---- Process table ---- */
  .table-wrap { flex: 1; overflow: auto; padding: 0 8px 8px; }
  table.proc { width: 100%; border-collapse: collapse; }
  table.proc thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--layer-solid);
    text-align: right; font-weight: 400; font-size: 12px; color: var(--text-2);
    padding: 7px 12px; cursor: pointer; white-space: nowrap;
    border-bottom: 1px solid var(--stroke);
  }
  table.proc thead th.name { text-align: left; }
  table.proc thead th .u { font-size: 10.5px; display: block; color: var(--text-3); font-variant-numeric: tabular-nums; }
  table.proc thead th:hover { background: var(--hover); }
  table.proc thead th.sorted { color: var(--accent); }
  table.proc thead th .arrow { font-size: 9px; margin-left: 3px; }

  tr.group td { padding: 12px 12px 5px; font-weight: 600; font-size: 12.5px; color: var(--text-2); }
  tr.proc-row { cursor: pointer; }
  tr.proc-row td { padding: 6px 12px; border-bottom: 1px solid var(--stroke); text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  tr.proc-row td.name { text-align: left; }
  tr.proc-row:hover td { background: var(--hover); }
  tr.proc-row.sel td { background: var(--sel) !important; }
  tr.proc-row.sel td.name::after {
    content: ""; position: absolute; left: 0; top: 4px; bottom: 4px; width: 3px; border-radius: 3px; background: var(--sel-bar);
  }
  td.name { position: relative; }
  .pname { display: flex; align-items: center; gap: 10px; padding-left: 6px; }
  .pico { width: 18px; height: 18px; flex: 0 0 18px; border-radius: 4px; display: grid; place-items: center; font-size: 11px; color: #fff; font-weight: 700; }
  .pname .txt { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
  .pname .txt b { font-weight: 400; font-size: 13px; }
  .pname .txt small { color: var(--text-3); font-size: 11px; }
  .expander { width: 16px; text-align: center; color: var(--text-3); font-size: 10px; }
  .heat { border-radius: 4px; }
  .status-chip { font-size: 11px; color: var(--text-2); }
  .status-chip.susp { color: var(--warn); }

  /* ---- Performance view ---- */
  .perf { display: grid; grid-template-columns: 260px 1fr; gap: 0; flex: 1; min-height: 0; }
  .perf-list { border-right: 1px solid var(--stroke); overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .perf-item {
    display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; gap: 2px 10px;
    padding: 10px 12px; border-radius: 7px; cursor: pointer; border: 1px solid transparent; position: relative;
    align-items: center;
  }
  .perf-item:hover { background: var(--hover); }
  .perf-item.active { background: var(--active); border-color: var(--stroke); }
  .perf-item.active::before { content:""; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:22px; border-radius:3px; background: var(--rl); }
  .perf-item .pl-name { font-weight: 600; font-size: 13px; }
  .perf-item .pl-detail { grid-column: 1; color: var(--text-2); font-size: 11.5px; font-variant-numeric: tabular-nums; }
  .perf-item .spark { grid-row: 1 / span 2; grid-column: 2; width: 82px; height: 40px; }
  .perf-main { padding: 18px 22px; overflow-y: auto; display: flex; flex-direction: column; }
  .perf-head { display: flex; align-items: baseline; justify-content: space-between; }
  .perf-head h2 { margin: 0; font-size: 22px; font-weight: 600; }
  .perf-head .sub { color: var(--text-2); font-size: 12.5px; }
  .graph-box { margin-top: 14px; border: 1px solid var(--stroke-strong); border-radius: 8px; padding: 4px; background: var(--layer-alt); }
  .graph-box canvas { width: 100%; height: 240px; display: block; }
  .axis-row { display: flex; justify-content: space-between; color: var(--text-3); font-size: 11px; padding: 4px 6px 0; }
  .cores { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 14px; }
  .core { border: 1px solid var(--stroke); border-radius: 6px; padding: 4px; background: var(--layer-alt); }
  .core canvas { width: 100%; height: 46px; display: block; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 26px; margin-top: 20px; }
  .stat .k { color: var(--text-2); font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px; }
  .stat .v { font-size: 19px; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .stat .v small { font-size: 12px; color: var(--text-3); font-weight: 400; }

  /* ---- Startup view ---- */
  .startup-list { flex: 1; overflow-y: auto; padding: 4px 12px 16px; }
  .su-row { display: grid; grid-template-columns: 34px 1fr 140px 120px 64px; align-items: center; gap: 10px; padding: 10px 10px; border-bottom: 1px solid var(--stroke); }
  .su-head { color: var(--text-2); font-size: 12px; border-bottom: 1px solid var(--stroke-strong); position: sticky; top: 0; background: var(--bg); }
  .su-row .pico { width: 26px; height: 26px; flex: 0 0 26px; font-size: 13px; }
  .su-name b { font-weight: 400; font-size: 13.5px; display: block; }
  .su-name small { color: var(--text-3); font-size: 11.5px; }
  .impact { font-size: 12.5px; }
  .impact.high { color: var(--crit); }
  .impact.med { color: var(--warn); }
  .impact.low { color: var(--good); }
  .toggle { width: 40px; height: 22px; border-radius: 12px; background: var(--stroke-strong); position: relative; cursor: pointer; transition: background .15s; }
  .toggle::after { content:""; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition: left .15s; box-shadow: 0 1px 2px rgba(0,0,0,.3); }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { left: 21px; }

  .placeholder { flex:1; display:grid; place-items:center; color: var(--text-3); text-align:center; padding: 40px; }
  .placeholder .big { width: 56px; height: 56px; margin: 0 auto 14px; color: var(--text-3); opacity:.6; }
  .placeholder h3 { color: var(--text-2); margin: 0 0 4px; font-weight: 600; font-size: 15px; }

  /* footer status strip */
  .statusstrip { display:flex; align-items:center; gap:22px; padding: 6px 18px; border-top: 1px solid var(--stroke); color: var(--text-2); font-size: 11.5px; font-variant-numeric: tabular-nums; }
  .statusstrip .dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:6px; }
  .statusstrip .s { display:flex; align-items:center; }
  .theme-toggle { margin-left:auto; cursor:pointer; color: var(--text-2); display:flex; align-items:center; gap:6px; }
  .theme-toggle:hover { color: var(--text); }
  .theme-toggle svg { width:14px; height:14px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  @media (max-width: 900px) {
    :root { --rail-w: 60px; }
    .nav-item .label, .nav-item .mini, .brand .tag { display: none; }
    .perf { grid-template-columns: 1fr; }
    .perf-list { flex-direction: row; overflow-x: auto; border-right: 0; border-bottom: 1px solid var(--stroke); }
    .perf-item { min-width: 190px; }
    .cores { grid-template-columns: repeat(4, 1fr); }
  }
</style>

  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const rand = (a,b)=>a+Math.random()*(b-a);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

  /* ---------- NAV ---------- */
  const nav = [
    {id:'processes', label:'Processes', icon:'M4 5h16M4 12h16M4 19h10'},
    {id:'performance', label:'Performance', icon:'M3 17l5-6 4 3 5-8 4 5'},
    {id:'history', label:'App history', icon:'M12 8v4l3 2M4 12a8 8 0 1 0 8-8'},
    {id:'startup', label:'Startup apps', icon:'M12 3v10M8 7l4-4 4 4M5 15v4h14v-4'},

  function setupCanvas(cv,h){
    const dpr=Math.min(devicePixelRatio||1,2);
    const w=cv.clientWidth||300;
    cv.width=w*dpr; cv.height=(h||cv.clientHeight)*dpr;
    const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx,w,h:(h||cv.clientHeight)};
  }
  function drawGraph(cv, data, colorVar, maxVal, grid){
    const {ctx,w,h}=setupCanvas(cv);
    ctx.clearRect(0,0,w,h);
    const col=css(colorVar);
    if(grid){
      ctx.strokeStyle=css('--stroke'); ctx.lineWidth=1;
      for(let i=1;i<5;i++){ const y=h*i/5; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
      for(let i=1;i<6;i++){ const x=w*i/6; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    }
    const n=data.length, step=w/(n-1);
    const y=v=>h-(clamp(v,0,maxVal)/maxVal)*(h-4)-2;
    // fill
    ctx.beginPath(); ctx.moveTo(0,h);
    for(let i=0;i<n;i++) ctx.lineTo(i*step, y(data[i]));
    ctx.lineTo(w,h); ctx.closePath();
    const grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, hexA(col,0.32)); grad.addColorStop(1, hexA(col,0.02));
    ctx.fillStyle=grad; ctx.fill();
    // line
    ctx.beginPath();
    for(let i=0;i<n;i++){ const px=i*step, py=y(data[i]); i?ctx.lineTo(px,py):ctx.moveTo(px,py); }
    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.lineJoin='round'; ctx.stroke();
    // pulse endpoint
    const ex=(n-1)*step, ey=y(data[n-1]);
    ctx.beginPath(); ctx.arc(ex,ey,2.6,0,7); ctx.fillStyle=col; ctx.fill();
  }
  function hexA(hex,a){
    hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
    const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function drawMain(){

  /* ---------- TICK ---------- */
  function tick(){
    // per-process jitter
    procs.forEach(p=>{
      if(p.status==='Suspended'){ p.vcpu=0; }
      else p.vcpu=clamp(p.vcpu+rand(-1.5,1.5), p.cpu[0], p.cpu[1]);
      p.vmem=clamp(p.vmem+rand(-15,15), p.mem[0], p.mem[1]);
      p.vdisk=clamp(p.vdisk+rand(-1,1), p.disk[0], p.disk[1]);
      p.vnet=clamp(p.vnet+rand(-4,4), p.net[0], p.net[1]);
      p.vgpu=clamp(p.vgpu+rand(-2,2), p.gpu[0], p.gpu[1]);
    });
    // totals
    totals.cpu=clamp(procs.reduce((s,p)=>s+p.vcpu,0)*0.9, 3, 100);
    totals.mem=clamp(procs.reduce((s,p)=>s+p.vmem,0)/1024 + 3.1, 4, 31);
    totals.disk=clamp(procs.reduce((s,p)=>s+p.vdisk,0)*3, 1, 100);
    totals.net=clamp(procs.reduce((s,p)=>s+p.vnet,0), 0.3, 90);
    totals.gpu=clamp(procs.reduce((s,p)=>s+p.vgpu,0)*0.8, 2, 100);
    // push history
    const map={cpu:totals.cpu,mem:totals.mem,disk:totals.disk,net:totals.net,gpu:totals.gpu};
    RES.forEach(r=>{ hist[r.id].push(map[r.id]); hist[r.id].shift(); });
    coreHist.forEach(h=>{ h.push(clamp(h[h.length-1]+rand(-14,14),1,100)); h.shift(); });
    // headers
    document.getElementById('hdr-cpu').textContent=totals.cpu.toFixed(0)+'%';
    document.getElementById('hdr-mem').textContent=totals.mem.toFixed(1)+' GB';
    document.getElementById('hdr-disk').textContent=totals.disk.toFixed(0)+'%';
    document.getElementById('hdr-net').textContent=totals.net.toFixed(1)+' Mbps';
    document.getElementById('hdr-gpu').textContent=totals.gpu.toFixed(0)+'%';
    // rail minis
    setMini('processes', procs.length);
    setMini('performance', totals.cpu.toFixed(0)+'%');
    // status strip
    document.getElementById('ss-cpu').textContent=totals.cpu.toFixed(0)+'%';
    document.getElementById('ss-mem').textContent=totals.mem.toFixed(1)+' GB';
    // views
    if(document.querySelector('.view[data-view="processes"]').classList.contains('active')) render();
    if(document.querySelector('.view[data-view="performance"]').classList.contains('active')){ drawMain(); drawSparks(); drawStats(); }
  }
  function setMini(id,val){ const el=document.querySelector(`[data-mini="${id}"]`); if(el) el.textContent=val; }

  // uptime clock
  let up=5527;
  setInterval(()=>{ up++; const h=Math.floor(up/3600),m=Math.floor(up%3600/60),s=up%60; document.getElementById('ss-up').textContent=`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; },1000);

  /* ---------- THEME TOGGLE ---------- */
  const root=document.documentElement;
  function curTheme(){ return root.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'); }
  document.getElementById('themeToggle').onclick=()=>{
    const next=curTheme()==='dark'?'light':'dark';
    root.setAttribute('data-theme',next);
    document.getElementById('themeLabel').textContent=next==='dark'?'Dark':'Light';
    layoutPerf();
  };

  /* ---------- INIT ---------- */
  // seed history
  for(let k=0;k<N;k++){ RES.forEach(r=>{ const base={cpu:12,mem:9.4,disk:8,net:6,gpu:9}[r.id]; hist[r.id][k]=base+rand(-4,10); }); }
  render(); renderStartup(); renderPerfMain();
  window.addEventListener('resize', ()=>layoutPerf());
  tick();
  setInterval(tick, reduce?2500:1200);
})();
</script>
